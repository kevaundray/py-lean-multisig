name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-13]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: astral-sh/setup-uv@v7

      # rust-toolchain.toml pins the rustc version; this action honors it.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Create virtualenv
        run: uv venv

      - name: Build + install (release, with dev extras)
        uses: PyO3/maturin-action@v1
        with:
          command: develop
          args: --release --extras dev
          sccache: true

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Check type stubs match runtime
        run: uv run python -m mypy.stubtest py_lean_multisig --allowlist stubtest_allowlist.txt
