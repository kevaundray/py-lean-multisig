name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Maintains a "release PR" that aggregates pending conventional-commit
      # changes — bumps the version in Cargo.toml + Cargo.lock, updates
      # CHANGELOG.md. Merging that PR creates a vX.Y.Z tag, which triggers
      # release.yml to build wheels + publish to PyPI.
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
