[package]
name = "py-lean-multisig"
version = "0.0.1"
edition = "2021"
resolver = "2"

[lib]
name = "py_lean_multisig"
crate-type = ["cdylib"]

[dependencies]
# pyo3/extension-module is enabled by maturin via [tool.maturin].features
# in pyproject.toml. Keeping it out of the dependency line lets cargo
# build/check work normally without the extension-module link rules.
pyo3 = { version = "0.27" }

# Upstream leanMultisig workspace, pinned by SHA. Bump deliberately and re-run parity tests.
xmss            = { git = "https://github.com/leanEthereum/leanMultisig.git", rev = "0b06b0e5107b8b40419ab5143faa29f37345047d" }
rec_aggregation = { git = "https://github.com/leanEthereum/leanMultisig.git", rev = "0b06b0e5107b8b40419ab5143faa29f37345047d" }
backend         = { git = "https://github.com/leanEthereum/leanMultisig.git", rev = "0b06b0e5107b8b40419ab5143faa29f37345047d" }
lean_compiler   = { git = "https://github.com/leanEthereum/leanMultisig.git", rev = "0b06b0e5107b8b40419ab5143faa29f37345047d" }
lean_vm         = { git = "https://github.com/leanEthereum/leanMultisig.git", rev = "0b06b0e5107b8b40419ab5143faa29f37345047d" }
sub_protocols   = { git = "https://github.com/leanEthereum/leanMultisig.git", rev = "0b06b0e5107b8b40419ab5143faa29f37345047d" }
lean_prover     = { git = "https://github.com/leanEthereum/leanMultisig.git", rev = "0b06b0e5107b8b40419ab5143faa29f37345047d" }
utils           = { git = "https://github.com/leanEthereum/leanMultisig.git", rev = "0b06b0e5107b8b40419ab5143faa29f37345047d" }

ethereum_ssz = "0.10"
hex          = "0.4"
serde        = { version = "1", features = ["derive"] }
postcard     = { version = "1", features = ["alloc"] }
rand         = "0.8"
sha3         = "0.10"

[profile.release]
lto = "thin"
codegen-units = 1
